# =============================================================================
# docker-compose.yml — Advanced GitHub Code Reviewer
# =============================================================================

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: reviewer-postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      # Use pg_isready which is native to the postgres image
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - reviewer-net

  # ── ChromaDB ─────────────────────────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: reviewer-chromadb
    restart: unless-stopped
    environment:
      CHROMA_SERVER_HOST: 0.0.0.0
      CHROMA_SERVER_PORT: 8000
      ANON_TELEMETRY: "False"
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8002:8000"
    healthcheck:
      # Use a shell command to check if the port is open (doesn't need curl/python)
      test: ["CMD-SHELL", "timeout 1s bash -c ':> /dev/tcp/127.0.0.1/8000' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - reviewer-net

  # ── FastAPI Application ───────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: code-reviewer-app:latest
    container_name: reviewer-app
    restart: unless-stopped
    env_file: .env
    environment:
      # Use variables from .env
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      CHECKPOINTER_DB_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      LOG_FORMAT: json
      LOG_LEVEL: INFO
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - chroma_store:/app/chroma_store
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started # Changed to started to avoid healthcheck loops
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    networks:
      - reviewer-net

  # ── Streamlit Dashboard ───────────────────────────────────────────────────────
  streamlit:
    image: code-reviewer-app:latest
    container_name: reviewer-streamlit
    restart: unless-stopped
    env_file: .env
    environment:
      API_BASE_URL: http://app:8000
      LOG_FORMAT: json
    command:
      - streamlit
      - run
      - streamlit_app/dashboard.py
      - --server.port=8501
      - --server.address=0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      app:
        condition: service_healthy
    networks:
      - reviewer-net

volumes:
  postgres_data:
  chroma_data:
  chroma_store:

networks:
  reviewer-net:
    driver: bridge